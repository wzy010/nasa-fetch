name: NASA_FINAL_ATTEMPT
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Precise Download
        run: |
          # 1. 彻底去掉 v= 参数，这个参数会导致 403
          # 2. 模拟完整的浏览器头信息
          curl -L "https://images-assets.nasa.gov/image/art002e008486/art002e008486~orig.jpg" \
               -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Referer: https://images.nasa.gov/" \
               -H "Accept: image/avif,image/webp,image/apng,image/svg+xml,image/*,*/*;q=0.8" \
               --compressed \
               -o final_earth.jpg

          # 检查大小
          ls -lh final_earth.jpg
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nasa-result
          path: final_earth.jpg
