name: NASA_FINAL_ATTEMPT
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Precise Download
        run: |
          # 使用解析出的真实物理存储地址，避开 ~orig 逻辑陷阱
          curl -L "https://images-assets.nasa.gov/image/art002e008486/art002e008486~orig.jpg" \
               -H "Authority: images-assets.nasa.gov" \
               -H "Referer: https://images.nasa.gov/" \
               -o earth_final_hd.jpg

          # 校验大小，如果成功，这里应该显示 14M
          ls -lh earth_final_hd.jpg
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nasa-result
          path: final_earth.jpg
